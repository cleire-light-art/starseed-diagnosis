<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魂のルーツ診断</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap');

  :root {
    --void: #f0eef8;
    --deep: #e8e4f4;
    --nebula: #ddd8f0;
    --purple-mid: #b8a8e0;
    --violet: #7a5ab8;
    --violet-light: #9b7dd8;
    --gold: #a07820;
    --gold-light: #c09030;
    --gold-soft: #d4a840;
    --stardust: #4a3878;
    --white-soft: #2a1e50;
    --text-main: #2a1e50;
    --text-sub: #4a3878;
    --text-muted: #8878b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text-main);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 星空背景 */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    opacity: 0;
  }

  /* 瞬かない常時点灯の星 */
  .star.steady {
    animation: none;
    opacity: var(--op, 0.7);
  }

  /* 大きめの星に輝きエフェクト */
  .star.bright {
    box-shadow: 0 0 4px 1px rgba(255,255,255,0.9), 0 0 8px 2px rgba(200,220,255,0.5);
  }

  /* ✦型に瞬く星（菱形クロス） */
  .star.cross {
    background: transparent !important;
    border-radius: 0;
    animation: twinkle-cross var(--dur, 3s) ease-in-out infinite;
    overflow: visible;
  }
  .star.cross::before,
  .star.cross::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.95);
  }
  /* 縦の菱形 */
  .star.cross::before {
    width: var(--cw, 5px);
    height: var(--cs, 18px);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }
  /* 横の菱形 */
  .star.cross::after {
    width: var(--cs, 18px);
    height: var(--cw, 5px);
    clip-path: polygon(0% 50%, 50% 0%, 100% 50%, 50% 100%);
  }

  .star.cross.steady {
    animation: none;
    opacity: var(--op, 0.7);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.6); }
    50% { opacity: var(--op, 1); transform: scale(1.1); }
  }

  @keyframes twinkle-cross {
    0%, 100% { opacity: 0; transform: scale(0.2); }
    50% { opacity: var(--op, 1); transform: scale(1); }
  }

  /* nebula glow */
  .nebula-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    background:
      linear-gradient(170deg, #1a1540 0%, #1e2060 18%, #152858 35%, #1a1e70 52%, #221548 68%, #2a1858 85%, #1e1645 100%),
      radial-gradient(ellipse 65% 55% at 20% 20%, rgba(100,120,255,0.45) 0%, transparent 65%),
      radial-gradient(ellipse 55% 65% at 80% 15%, rgba(80,60,180,0.40) 0%, transparent 65%),
      radial-gradient(ellipse 75% 45% at 50% 80%, rgba(120,80,200,0.35) 0%, transparent 65%),
      radial-gradient(ellipse 45% 55% at 65% 50%, rgba(60,100,200,0.25) 0%, transparent 65%);
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ===== SCREEN MANAGEMENT ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== TOP SCREEN ===== */
  #screen-top {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 20px;
  }
  #screen-top.active {
    display: flex;
  }

  .top-ornament {
    font-size: 2.4rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.9);
    margin-bottom: 32px;
  }

  .top-title {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: clamp(2rem, 6vw, 3.2rem);
    letter-spacing: 0.25em;
    background: linear-gradient(135deg, #ffffff 0%, #e8d8ff 40%, #c8b8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .top-divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    margin: 0 auto 28px;
  }

  .top-subtitle {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: clamp(1rem, 3vw, 1.2rem);
    color: rgba(255,255,255,0.92);
    letter-spacing: 0.15em;
    line-height: 2;
    margin-bottom: 48px;
  }

  .top-note {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.1em;
    margin-bottom: 40px;
    line-height: 2;
  }

  .btn-start {
    display: inline-block;
    padding: 16px 48px;
    background: linear-gradient(135deg, #9070d0, #6a48b8);
    border: 1px solid #c09030;
    border-radius: 2px;
    color: #fff8e0;
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(120,90,200,0.25);
  }
  .btn-start::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,240,180,0.2), transparent);
    transition: left 0.5s ease;
  }
  .btn-start:hover::before { left: 100%; }
  .btn-start:hover {
    background: linear-gradient(135deg, #a080e0, #7a58c8);
    box-shadow: 0 8px 32px rgba(120,90,200,0.4);
    transform: translateY(-2px);
  }

  /* ===== QUESTION SCREEN ===== */
  #screen-quiz {
    padding: 48px 20px 80px;
  }

  .quiz-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .progress-label {
    font-size: 0.75rem;
    color: #8878b8;
    letter-spacing: 0.2em;
    margin-bottom: 12px;
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 400px;
    margin: 0 auto 8px;
    height: 2px;
    background: rgba(150,120,210,0.2);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--violet), var(--gold));
    border-radius: 1px;
    transition: width 0.4s ease;
  }

  .question-card {
    background: rgba(255, 252, 255, 0.75);
    border: 1px solid rgba(150,120,210,0.3);
    border-radius: 4px;
    padding: 36px 32px;
    margin-bottom: 28px;
    backdrop-filter: blur(16px);
    box-shadow: 0 4px 40px rgba(120,90,180,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .question-number {
    font-size: 0.7rem;
    color: #a07820;
    letter-spacing: 0.3em;
    margin-bottom: 16px;
  }

  .question-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.05rem, 3vw, 1.25rem);
    font-weight: 400;
    line-height: 1.9;
    letter-spacing: 0.05em;
    color: #2a1e50;
    margin-bottom: 32px;
  }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .scale-label {
    font-size: 0.72rem;
    color: #5a4890;
    letter-spacing: 0.02em;
    text-align: center;
    flex: 1;
    line-height: 1.4;
  }

  .scale-options {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .scale-btn {
    flex: 1;
    max-width: 80px;
    padding: 14px 4px;
    background: rgba(240, 236, 255, 0.7);
    border: 1px solid rgba(150,120,210,0.35);
    border-radius: 2px;
    color: #5a4890;
    font-size: 1rem;
    letter-spacing: 0;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    line-height: 1.4;
  }
  .btn-icon {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.2rem;
    line-height: 1;
    display: block;
    letter-spacing: -0.05em;
  }
  .scale-btn:hover {
    background: rgba(180,150,240,0.3);
    border-color: var(--violet-light);
    color: #3a2870;
  }
  .scale-btn.selected {
    background: linear-gradient(135deg, #c0a8f0, #8a60d0);
    border-color: var(--gold);
    color: #fff8e8;
    box-shadow: 0 0 16px rgba(140,100,220,0.4);
  }

  .quiz-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }

  .btn-nav {
    padding: 12px 28px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(150,120,210,0.4);
    border-radius: 2px;
    color: #5a4890;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-nav:hover {
    border-color: var(--violet);
    color: #3a2870;
    background: rgba(200,180,255,0.3);
  }
  .btn-nav:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-next {
    padding: 12px 32px;
    background: linear-gradient(135deg, #9070d0, #6a48b8);
    border: 1px solid #c09030;
    border-radius: 2px;
    color: #fff8e0;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn-next:hover {
    background: linear-gradient(135deg, #a080e0, #7a58c8);
    box-shadow: 0 4px 20px rgba(120,90,200,0.35);
  }
  .btn-next:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ===== RESULT SCREEN ===== */
  #screen-result {
    padding: 60px 20px 80px;
  }

  .result-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .result-ornament {
    font-size: 1.8rem;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.3em;
    margin-bottom: 20px;
  }

  .result-title {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: clamp(1.4rem, 4vw, 2rem);
    letter-spacing: 0.2em;
    background: linear-gradient(135deg, #ffffff 0%, #e8d8ff 40%, #c8b8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .result-subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
  }

  /* ドーナツグラフ */
  .chart-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 48px;
  }

  .donut-container {
    position: relative;
    width: 260px;
    height: 260px;
    margin-bottom: 32px;
  }

  .donut-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
    filter: drop-shadow(0 0 20px rgba(107,63,160,0.4));
  }

  .donut-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .donut-center-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    display: block;
    margin-bottom: 4px;
  }

  .donut-center-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    color: var(--gold-light);
    letter-spacing: 0.1em;
    display: block;
  }

  /* 凡例 */
  .legend {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .legend-color {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-bar-wrap {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
  }

  .legend-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  .legend-name {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.1em;
    min-width: 90px;
  }

  .legend-pct {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.9);
    min-width: 36px;
    text-align: right;
    letter-spacing: 0.05em;
  }

  /* 上位カテゴリーの詳細 */
  .result-details {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 48px;
  }

  .detail-card {
    background: rgba(255, 252, 255, 0.75);
    border-radius: 4px;
    padding: 28px 28px;
    border-left: 3px solid #9070d0;
    backdrop-filter: blur(16px);
    box-shadow: 0 4px 30px rgba(120,90,180,0.12);
  }

  .detail-card:first-child {
    border-left-color: var(--gold);
  }

  .detail-rank {
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.3em;
    margin-bottom: 6px;
  }

  .detail-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.2rem;
    font-weight: 300;
    color: var(--white-soft);
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }

  .detail-pct {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  .detail-divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .detail-desc {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.88rem;
    font-weight: 300;
    line-height: 2;
    color: #3a2e68;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }

  .detail-colors-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
  }

  .detail-colors {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 14px;
    margin-bottom: 14px;
  }

  .color-chip-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .color-chip {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(150,120,200,0.25);
    flex-shrink: 0;
    cursor: default;
    transition: transform 0.2s;
  }
  .color-chip:hover { transform: scale(1.2); }

  .color-chip-name {
    font-size: 0.7rem;
    color: #6858a8;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .detail-motifs-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }

  .detail-motifs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .motif-tag {
    padding: 4px 12px;
    background: rgba(107,63,160,0.2);
    border: 1px solid rgba(107,63,160,0.3);
    border-radius: 20px;
    font-size: 0.72rem;
    color: var(--text-sub);
    letter-spacing: 0.1em;
  }

  .btn-retry {
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    padding: 16px;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(150,120,210,0.4);
    border-radius: 2px;
    color: #5a4890;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
  }
  .btn-retry:hover {
    border-color: #9070d0;
    color: #3a2870;
    background: rgba(200,180,255,0.3);
  }

  /* アニメーション */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in {
    animation: fadeInUp 0.6s ease forwards;
  }
  .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
  .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
  .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }

  @media (max-width: 480px) {
    .question-card { padding: 24px 20px; }
    .scale-btn { padding: 12px 2px; font-size: 0.7rem; }
    .detail-card { padding: 22px 18px; }
  }
</style>
</head>
<body>

<!-- 星空 -->
<div class="nebula-bg"></div>
<div class="stars" id="stars"></div>

<!-- TOP SCREEN -->
<div id="screen-top" class="screen active">
  <div class="container">
    <div class="top-ornament fade-in">✦ ✧ ✦</div>
    <h1 class="top-title fade-in fade-in-delay-1">魂のルーツ診断</h1>
    <div class="top-divider fade-in fade-in-delay-2"></div>
    <p class="top-subtitle fade-in fade-in-delay-2">
      あなたの魂が経由してきた星と文明を<br>紐解く旅へ
    </p>
    <p class="top-note fade-in fade-in-delay-3">
      30の問いに直感でお答えください<br>
      あなただけの魂の成分が現れます
    </p>
    <button class="btn-start fade-in fade-in-delay-3" onclick="startQuiz()">
      診断をはじめる
    </button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
  <div class="container">
    <div class="quiz-header">
      <div class="progress-label" id="progress-label">1 / 30</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width:3.3%"></div>
      </div>
    </div>

    <div class="question-card" id="question-card">
      <div class="question-number" id="q-number">Q 01</div>
      <div class="question-text" id="q-text"></div>

      <div class="scale-labels">
        <div class="scale-label">とても<br>当てはまる</div>
        <div class="scale-label">少し<br>当てはまる</div>
        <div class="scale-label">どちらでも<br>ない</div>
        <div class="scale-label">あまり<br>当てはまらない</div>
        <div class="scale-label">全く<br>当てはまらない</div>
      </div>

      <div class="scale-options" id="scale-options">
        <button class="scale-btn" onclick="selectAnswer(2, this)"><span class="btn-icon">◎</span></button>
        <button class="scale-btn" onclick="selectAnswer(1, this)"><span class="btn-icon">◯</span></button>
        <button class="scale-btn" onclick="selectAnswer(0, this)"><span class="btn-icon">△</span></button>
        <button class="scale-btn" onclick="selectAnswer(-1, this)"><span class="btn-icon">✕</span></button>
        <button class="scale-btn" onclick="selectAnswer(-2, this)"><span class="btn-icon">✕✕</span></button>
      </div>
    </div>

    <div class="quiz-nav">
      <button class="btn-nav" id="btn-prev" onclick="prevQuestion()" disabled>← 戻る</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>次へ →</button>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result" class="screen">
  <div class="container">
    <div class="result-header fade-in">
      <div class="result-ornament">✦</div>
      <h2 class="result-title">あなたの魂の成分</h2>
      <p class="result-subtitle">SOUL COMPOSITION</p>
    </div>

    <div class="chart-wrap fade-in fade-in-delay-1">
      <div class="donut-container">
        <svg class="donut-svg" viewBox="0 0 200 200" id="donut-svg"></svg>
        <div class="donut-center">
          <span class="donut-center-label">最も強い魂の記憶</span>
          <span class="donut-center-name" id="donut-top-name"></span>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="result-details fade-in fade-in-delay-2" id="result-details"></div>

    <button class="btn-retry fade-in fade-in-delay-3" onclick="retryQuiz()">
      もう一度診断する
    </button>
  </div>
</div>

<script>
// ===== DATA =====
const CATEGORIES = [
  {

// ===== STARS =====
function createStars() {
  const container = document.getElementById('stars');
  const starColors = [
    'rgba(255,255,255,VAR)',
    'rgba(220,230,255,VAR)',
    'rgba(255,250,220,VAR)',
    'rgba(240,220,255,VAR)',
    'rgba(200,230,255,VAR)',
  ];

  // 中央エリアかどうか判定（x:25-75%, y:20-80%）
  function isCentral(x, y) {
    return x > 25 && x < 75 && y > 20 && y < 80;
  }

  // 瞬く小さな星（全体に散らばる）
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 1.8 + 0.8;
    const op = (0.4 + Math.random() * 0.5).toFixed(2);
    const color = starColors[Math.floor(Math.random() * starColors.length)].replace('VAR', op);
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    s.style.cssText = `
      left:${x}%; top:${y}%;
      width:${size}px; height:${size}px;
      background:${color};
      --dur:${2+Math.random()*4}s; --op:${op};
      animation-delay:${Math.random()*6}s;
    `;
    container.appendChild(s);
  }

  // 常時点灯の小さな星（全体）
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star steady';
    const size = Math.random() * 1.5 + 0.6;
    const op = (0.25 + Math.random() * 0.45).toFixed(2);
    const color = starColors[Math.floor(Math.random() * starColors.length)].replace('VAR', op);
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    s.style.cssText = `
      left:${x}%; top:${y}%;
      width:${size}px; height:${size}px;
      background:${color}; --op:${op};
    `;
    container.appendChild(s);
  }

  // 大きくて明るい瞬く星（外側エリア優先・約2割を十字型に）
  let placed = 0;
  let attempts = 0;
  while (placed < 35 && attempts < 400) {
    attempts++;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    if (isCentral(x, y)) continue;
    const isCross = placed < 7; // 最初の7個（約2割）を十字型に
    const s = document.createElement('div');
    const size = Math.random() * 2.5 + 3;
    const op = (0.8 + Math.random() * 0.2).toFixed(2);
    const color = starColors[Math.floor(Math.random() * 2)].replace('VAR', op);
    if (isCross) {
      s.className = 'star cross';
      const crossSize = Math.round(size * 4);
      const crossW = Math.round(size * 1.2);
      s.style.cssText = `
        left:${x}%; top:${y}%;
        width:${size}px; height:${size}px;
        --cs:${crossSize}px; --cw:${crossW}px;
        --dur:${2+Math.random()*3}s; --op:${op};
        animation-delay:${Math.random()*5}s;
      `;
    } else {
      s.className = 'star bright';
      s.style.cssText = `
        left:${x}%; top:${y}%;
        width:${size}px; height:${size}px;
        background:${color};
        --dur:${1.5+Math.random()*3}s; --op:${op};
        animation-delay:${Math.random()*5}s;
      `;
    }
    container.appendChild(s);
    placed++;
  }

  // 常時点灯の明るい星（外側）
  placed = 0; attempts = 0;
  while (placed < 15 && attempts < 200) {
    attempts++;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    if (isCentral(x, y)) continue;
    const s = document.createElement('div');
    s.className = 'star bright steady';
    const size = Math.random() * 2 + 2.5;
    const op = (0.7 + Math.random() * 0.3).toFixed(2);
    const color = starColors[Math.floor(Math.random() * 2)].replace('VAR', op);
    s.style.cssText = `
      left:${x}%; top:${y}%;
      width:${size}px; height:${size}px;
      background:${color}; --op:${op};
    `;
    container.appendChild(s);
    placed++;
  }

  // 銀河帯：右上エリアに小さい星を密集（グロウなし・小さめサイズのみ）
  // 右上の斜め帯（x:50-100%, y:0-45%）に集中
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    const isTwinkle = Math.random() > 0.45;
    s.className = isTwinkle ? 'star' : 'star steady';
    const size = Math.random() * 1.2 + 0.4; // 小さめに統一
    const op = (0.35 + Math.random() * 0.55).toFixed(2);
    const color = starColors[Math.floor(Math.random() * 3)].replace('VAR', op);
    // 右上の斜め帯状に分布（右に行くほどyが小さい）
    const x = 50 + Math.random() * 50;
    const maxY = 45 - ((x - 50) / 50) * 20; // 右上方向に斜めに絞る
    const y = Math.random() * maxY;
    s.style.cssText = `
      left:${x}%; top:${y}%;
      width:${size}px; height:${size}px;
      background:${color};
      --dur:${2+Math.random()*5}s; --op:${op};
      animation-delay:${Math.random()*6}s;
    `;
    container.appendChild(s);
  }
}

// ===== QUIZ =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz() {
  currentQ = 0;
  answers = new Array(30).fill(null);
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('q-number').textContent = `Q ${String(currentQ+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-label').textContent = `${currentQ+1} / 30`;
  document.getElementById('progress-bar').style.width = `${((currentQ+1)/30)*100}%`;
  document.getElementById('btn-prev').disabled = currentQ === 0;
  document.getElementById('btn-next').disabled = answers[currentQ] === null;

  // ボタン状態リセット
  const btns = document.querySelectorAll('.scale-btn');
  const scores = [2,1,0,-1,-2];
  btns.forEach((btn, i) => {
    btn.classList.remove('selected');
    if (answers[currentQ] === scores[i]) btn.classList.add('selected');
  });
}

function selectAnswer(score, btn) {
  answers[currentQ] = score;
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  if (answers[currentQ] === null) return;
  if (currentQ < 29) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function retryQuiz() {
  startQuiz();
}

// ===== RESULT =====
function showResult() {
  // スコア集計
  const scores = {};
  CATEGORIES.forEach(c => scores[c.id] = 0);
  QUESTIONS.forEach((q, i) => {
    if (answers[i] !== null) scores[q.cat] += answers[i];
  });

  // 正規化（min-max → 0以上に）
  const minScore = -6;
  const maxScore = 6;
  const normalized = {};
  let total = 0;
  CATEGORIES.forEach(c => {
    normalized[c.id] = Math.max(0, scores[c.id] - minScore);
    total += normalized[c.id];
  });

  // パーセント計算
  const percents = {};
  if (total === 0) {
    CATEGORIES.forEach(c => percents[c.id] = 10);
    total = 100;
  } else {
    CATEGORIES.forEach(c => {
      percents[c.id] = Math.round((normalized[c.id] / total) * 100);
    });
    // 合計100に調整
    let sum = Object.values(percents).reduce((a,b)=>a+b,0);
    const diff = 100 - sum;
    const topCat = CATEGORIES.sort((a,b) => percents[b.id]-percents[a.id])[0];
    percents[topCat.id] += diff;
  }

  // ソート
  const sorted = CATEGORIES.slice().sort((a,b) => percents[b.id]-percents[a.id]);

  showScreen('screen-result');
  document.getElementById('donut-top-name').textContent = sorted[0].name;
  renderDonut(sorted, percents);
  renderLegend(sorted, percents);
  renderDetails(sorted, percents);
}

  const stops = [

    ['60%','#f0f0c0'],['80%','#f0c8f0'],['100%','#c0e8f8']
  ];
  stops.forEach(([offset, color]) => {
    const stop = document.createElementNS('http://www.w3.org/2000/svg','stop');
    stop.setAttribute('offset', offset);
    stop.setAttribute('stop-color', color);
    grad.appendChild(stop);
  });
  defs.appendChild(grad);
  svg.appendChild(defs);
  const cx=100, cy=100, r=80, strokeW=28;
  const circumference = 2 * Math.PI * r;
  let offset = 0;

  sorted.forEach((cat, i) => {
    const pct = percents[cat.id] / 100;
    const dash = circumference * pct;
    const gap = circumference - dash;

    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', r);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', cat.chartColor);
    circle.setAttribute('stroke-width', strokeW);
    circle.setAttribute('stroke-dasharray', `${dash} ${gap}`);
    circle.setAttribute('stroke-dashoffset', -offset * circumference);
    circle.style.transition = 'stroke-dasharray 1s ease';
    svg.appendChild(circle);
    offset += pct;
  });

  // 中心の穴
  const inner = document.createElementNS('http://www.w3.org/2000/svg','circle');
  inner.setAttribute('cx', cx);
  inner.setAttribute('cy', cy);
  inner.setAttribute('r', r - strokeW/2 - 2);
  inner.setAttribute('fill', '#0a0812');
  svg.appendChild(inner);
}

function renderLegend(sorted, percents) {
  const container = document.getElementById('legend');
  container.innerHTML = '';
  sorted.forEach(cat => {
    const pct = percents[cat.id];
    const isLemuria = cat.id === 'lemuria';
    const dotStyle = isLemuria
      ? 'background: conic-gradient(#f8c0d8, #c0d0f8, #c0f0e0, #f0f0c0, #f0c8f0, #c0e8f8, #f8c0d8);'
      : `background:${cat.chartColorFallback || cat.chartColor};`;
    const barStyle = isLemuria
      ? `width:${pct}%; background: linear-gradient(90deg, #f8c0d8, #c0d0f8, #c0f0e0, #f0c8f0);`
      : `width:${pct}%; background:${cat.chartColorFallback || cat.chartColor};`;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-color" style="${dotStyle}"></div>
      <div class="legend-name">${cat.name}</div>
      <div class="legend-bar-wrap">
        <div class="legend-bar" style="${barStyle}"></div>
      </div>
      <div class="legend-pct">${pct}%</div>
    `;
    container.appendChild(item);
  });
}

function renderDetails(sorted, percents) {
  const container = document.getElementById('result-details');
  container.innerHTML = '';
  const top3 = sorted.slice(0, 3);

  top3.forEach((cat, i) => {
    const pct = percents[cat.id];
    const ranks = ['✦ 第1位', '✧ 第2位', '· 第3位'];
    const card = document.createElement('div');
    card.className = 'detail-card';
    card.innerHTML = `
      <div class="detail-rank">${ranks[i]}</div>
      <div class="detail-name">${cat.name} <span style="font-size:0.75rem;color:var(--text-muted);letter-spacing:0.1em">${cat.nameEn}</span></div>
      <div class="detail-pct">${pct}%</div>
      <div class="detail-divider"></div>
      <div class="detail-desc">${cat.desc}</div>
      <div class="detail-colors-label">魂の色</div>
      <div class="detail-colors">
        ${cat.colors.map((c,j)=>{
          const special = cat.colorSpecial ? cat.colorSpecial[j] : null;
          let bg = '';
          if (special === 'opal') {
            bg = 'background: conic-gradient(from 0deg, #f8c0d8, #c0d0f8, #c0f0e0, #f0f0c0, #f0c8f0, #c0e8f8, #f8c0d8); border: 1px solid rgba(255,255,255,0.6);';
          } else if (special === 'hologram') {
            bg = 'background: linear-gradient(135deg, #d0c8ff, #a0d8ff, #d0f8f0, #f0d0ff, #d0c8ff); border: 1px solid rgba(200,200,255,0.5);';
          } else {
            bg = `background:${c};`;
          }
          return `<div class="color-chip-wrap">
            <div class="color-chip" style="${bg}" title="${cat.colorNames[j]}"></div>
            <span class="color-chip-name">${cat.colorNames[j]}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="detail-motifs-label">魂のシンボル</div>
      <div class="detail-motifs">
        ${cat.motifs.map(m=>`<span class="motif-tag">${m}</span>`).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}
</script>
</body>
</html>
